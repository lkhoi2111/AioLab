[phases.setup]
nixPkgs = [
  "nodejs_20",
  "python311",
  "python311Packages.pip",
  "ffmpeg",
  "yt-dlp"
]

[phases.install]
cmds = [
  "cd backend && npm install",
  "pip install -r worker/requirements.txt",
  "if [ \"$INSTALL_OPTIONAL_AUDIO_DEPS\" = \"true\" ]; then pip install -r worker/requirements-optional.txt; else echo 'Skipping optional Spleeter/TensorFlow packages'; fi"
]

[start]
cmd = "cd backend && npm start"
